---
# Dev slot — frontend + backend services, redeploys on every push to `dev` branch
#
# Traefik routing:
#   https://dev.${DOMAIN}/           → dashboard-frontend-dev (nginx, port 8080)
#   https://dev.${DOMAIN}/api/*      → dashboard-backend-dev  (express, port 3000)
#   https://dev.${DOMAIN}/health     → dashboard-backend-dev  (express, port 3000)
#
# Lifecycle     : persistent slot, containers recreated on each deploy
# Auth          : basic-auth via DASHBOARD_AUTH secret (htpasswd string)
#
# Environment variables injected by deploy-dev.yml workflow:
#   IMAGE_TAG       — full commit SHA of the built images
#   REGISTRY_URL    — container registry hostname
#   DOMAIN          — base domain (e.g. example.com)
#   DASHBOARD_AUTH  — htpasswd string for basic-auth

networks:
  traefik-public:
    external: true

services:

  dashboard-backend-dev:
    image: ${REGISTRY_URL}/dashboard-backend:${IMAGE_TAG:-latest}
    container_name: dashboard-backend-dev
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # Harden container filesystem — read-only root FS, /tmp as tmpfs
    # See docs/adr/006-docker-socket-hardening.md for rationale
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      # Docker socket mounted read-only — backend only reads container state
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      NODE_ENV: development
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"

      # ---- Backend: /health (no auth — required for smoke test / uptime checks) ----
      - "traefik.http.routers.dashboard-dev-health.rule=Host(`dev.${DOMAIN}`) && Path(`/health`)"
      - "traefik.http.routers.dashboard-dev-health.entrypoints=websecure"
      - "traefik.http.routers.dashboard-dev-health.tls=true"
      - "traefik.http.routers.dashboard-dev-health.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard-dev-health.priority=20"
      - "traefik.http.routers.dashboard-dev-health.service=dashboard-backend-dev"

      # ---- Backend: /api/* (requires auth) ----
      - "traefik.http.routers.dashboard-dev-api.rule=Host(`dev.${DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.dashboard-dev-api.entrypoints=websecure"
      - "traefik.http.routers.dashboard-dev-api.tls=true"
      - "traefik.http.routers.dashboard-dev-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard-dev-api.middlewares=dashboard-dev-auth"
      - "traefik.http.routers.dashboard-dev-api.priority=10"
      - "traefik.http.routers.dashboard-dev-api.service=dashboard-backend-dev"
      - "traefik.http.services.dashboard-backend-dev.loadbalancer.server.port=3000"

  dashboard-frontend-dev:
    image: ${REGISTRY_URL}/dashboard-frontend:${IMAGE_TAG:-latest}
    container_name: dashboard-frontend-dev
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # nginx writes to cache, pid, and tmp at runtime — provide tmpfs for each
    # /var/cache/nginx needs mode 01777 so the non-root nginx user can create
    # temp subdirectories; the image chown is overwritten by the tmpfs mount.
    read_only: true
    tmpfs:
      - /var/run
      - /tmp
    volumes:
      - type: tmpfs
        target: /var/cache/nginx
        tmpfs:
          mode: 01777
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"

      # ---- HTTP → HTTPS redirect ----
      - "traefik.http.routers.dashboard-dev-http.rule=Host(`dev.${DOMAIN}`)"
      - "traefik.http.routers.dashboard-dev-http.entrypoints=web"
      - "traefik.http.routers.dashboard-dev-http.middlewares=redirect-to-https"

      # ---- HTTPS router → frontend (catch-all, lower priority) ----
      - "traefik.http.routers.dashboard-dev.rule=Host(`dev.${DOMAIN}`)"
      - "traefik.http.routers.dashboard-dev.entrypoints=websecure"
      - "traefik.http.routers.dashboard-dev.tls=true"
      - "traefik.http.routers.dashboard-dev.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard-dev.middlewares=dashboard-dev-auth"
      - "traefik.http.routers.dashboard-dev.priority=1"
      - "traefik.http.routers.dashboard-dev.service=dashboard-frontend-dev"
      - "traefik.http.services.dashboard-frontend-dev.loadbalancer.server.port=8080"

      # ---- Basic-auth middleware (shared by both routers) ----
      - "traefik.http.middlewares.dashboard-dev-auth.basicauth.users=${DASHBOARD_AUTH}"
