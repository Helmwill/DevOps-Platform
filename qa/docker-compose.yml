---
# QA slot — frontend + backend services, ephemeral (spun up for gauntlet, torn down after prod deploy)
#
# Traefik routing:
#   https://qa.${DOMAIN}/           → dashboard-frontend-qa (nginx, port 8080)
#   https://qa.${DOMAIN}/api/*      → dashboard-backend-qa  (express, port 3000)
#   https://qa.${DOMAIN}/health     → dashboard-backend-qa  (express, port 3000)
#
# Lifecycle     : ephemeral — `docker compose up -d` / `docker compose down`
# Auth          : basic-auth via DASHBOARD_AUTH secret (htpasswd string)
#
# Environment variables injected by deploy-qa.yml workflow:
#   IMAGE_TAG       — full commit SHA promoted from dev (no rebuild)
#   REGISTRY_URL    — container registry hostname
#   DOMAIN          — base domain (e.g. example.com)
#   DASHBOARD_AUTH  — htpasswd string for basic-auth

networks:
  traefik-public:
    external: true

services:

  dashboard-backend-qa:
    image: ${REGISTRY_URL}/dashboard-backend:${IMAGE_TAG:-latest}
    container_name: dashboard-backend-qa
    # no restart policy — QA slot is ephemeral and torn down after prod deploy
    restart: "no"
    security_opt:
      - no-new-privileges:true
    # Harden container filesystem — read-only root FS, /tmp as tmpfs
    # See docs/adr/006-docker-socket-hardening.md for rationale
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      # Docker socket mounted read-only — backend only reads container state
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      NODE_ENV: test
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"

      # ---- Backend: /api/* and /health (high priority) ----
      - "traefik.http.routers.dashboard-qa-api.rule=Host(`qa.${DOMAIN}`) && (PathPrefix(`/api`) || Path(`/health`))"
      - "traefik.http.routers.dashboard-qa-api.entrypoints=websecure"
      - "traefik.http.routers.dashboard-qa-api.tls=true"
      - "traefik.http.routers.dashboard-qa-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard-qa-api.middlewares=dashboard-qa-auth"
      - "traefik.http.routers.dashboard-qa-api.priority=10"
      - "traefik.http.routers.dashboard-qa-api.service=dashboard-backend-qa"
      - "traefik.http.services.dashboard-backend-qa.loadbalancer.server.port=3000"

  dashboard-frontend-qa:
    image: ${REGISTRY_URL}/dashboard-frontend:${IMAGE_TAG:-latest}
    container_name: dashboard-frontend-qa
    # no restart policy — QA slot is ephemeral and torn down after prod deploy
    restart: "no"
    security_opt:
      - no-new-privileges:true
    # nginx writes to cache, pid, and tmp at runtime — provide tmpfs for each
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"

      # ---- HTTP → HTTPS redirect ----
      - "traefik.http.routers.dashboard-qa-http.rule=Host(`qa.${DOMAIN}`)"
      - "traefik.http.routers.dashboard-qa-http.entrypoints=web"
      - "traefik.http.routers.dashboard-qa-http.middlewares=redirect-to-https"

      # ---- HTTPS router → frontend (catch-all, lower priority) ----
      - "traefik.http.routers.dashboard-qa.rule=Host(`qa.${DOMAIN}`)"
      - "traefik.http.routers.dashboard-qa.entrypoints=websecure"
      - "traefik.http.routers.dashboard-qa.tls=true"
      - "traefik.http.routers.dashboard-qa.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard-qa.middlewares=dashboard-qa-auth"
      - "traefik.http.routers.dashboard-qa.priority=1"
      - "traefik.http.routers.dashboard-qa.service=dashboard-frontend-qa"
      - "traefik.http.services.dashboard-frontend-qa.loadbalancer.server.port=8080"

      # ---- Basic-auth middleware (shared by both routers) ----
      - "traefik.http.middlewares.dashboard-qa-auth.basicauth.users=${DASHBOARD_AUTH}"
