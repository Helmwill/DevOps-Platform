# =============================================================================
# DEPLOY PROD — Promote QA-verified image to production with manual gate
# Trigger: workflow_run — runs only after deploy-qa completes successfully
#
# Jobs:
#   approval-gate    — Pauses for manual approval from Helmwill (environment: production)
#   deploy-prod      — SSH to VPS, pull same image to prod slot, docker compose up -d
#   smoke-test-prod  — Health-check against the production subdomain
#   teardown-qa      — Tear down the QA slot after successful prod deployment
#
# The image is NEVER rebuilt here.  The exact image digest that passed all
# QA gauntlet gates is identified by the commit SHA from the workflow_run
# event and pulled directly from the registry.
# =============================================================================

name: Deploy Prod

on:
  workflow_run:
    workflows:
      - "Deploy QA"
    types:
      - completed
    branches:
      - develop

# Serialise production deployments — never run two at once
concurrency:
  group: deploy-prod
  cancel-in-progress: false   # Never cancel an in-progress production deployment

jobs:

  # ---------------------------------------------------------------------------
  # GUARD — Abort if the QA pipeline did not succeed in full.
  # All five gauntlet gates must have passed before prod is touched.
  # ---------------------------------------------------------------------------
  guard:
    name: Guard — Verify Deploy QA Succeeded
    runs-on: ubuntu-latest
    if: ${{ gitea.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Confirm upstream success
        run: echo "Deploy QA succeeded — proceeding to production approval gate"

  # ---------------------------------------------------------------------------
  # APPROVAL GATE — Manual approval required before production deployment
  # This job targets the `production` Gitea environment, which must be
  # configured in Gitea with Helmwill as a required reviewer.
  #
  # No automation bypasses this gate.  A human must explicitly approve in the
  # Gitea UI before deploy-prod is allowed to run.
  # ---------------------------------------------------------------------------
  approval-gate:
    name: Approval Gate (Helmwill)
    runs-on: ubuntu-latest
    needs: guard
    # The `production` environment in Gitea must have:
    #   - Required reviewers: Helmwill
    #   - Protection rule: prevent self-review
    # The job will remain in "waiting" state until approved or rejected.
    environment: production

    steps:
      - name: Record approval
        # This step only runs after Helmwill has approved the deployment
        # in the Gitea Actions environment protection UI.
        run: |
          echo "Production deployment approved."
          echo "Deploying commit SHA: ${{ gitea.event.workflow_run.head_sha }}"
          echo "Image: ${{ secrets.REGISTRY_URL }}/dashboard:${{ gitea.event.workflow_run.head_sha }}"

  # ---------------------------------------------------------------------------
  # DEPLOY PROD — Pull exact image digest to VPS production slot
  # Uses the same commit SHA that was verified through the entire QA pipeline.
  # The production docker-compose project is kept strictly separate from dev/QA.
  # ---------------------------------------------------------------------------
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: approval-gate

    steps:
      - name: Write SSH deploy key
        run: |
          install -m 600 /dev/null /tmp/deploy_key
          echo "${{ secrets.VPS_SSH_KEY }}" > /tmp/deploy_key

      - name: Deploy to VPS production slot via SSH
        # Pulls the EXACT same image digest that passed all QA gates.
        # No code changes, no rebuild — pure image promotion.
        run: |
          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "
              set -euo pipefail

              SHA='${{ gitea.event.workflow_run.head_sha }}'

              # Authenticate the VPS Docker daemon with the registry
              echo '${{ secrets.REGISTRY_PASSWORD }}' | \
                docker login '${{ secrets.REGISTRY_URL }}' \
                  --username '${{ secrets.REGISTRY_USER }}' \
                  --password-stdin

              # Pull the exact image that was verified in QA — no rebuild
              docker pull '${{ secrets.REGISTRY_URL }}/dashboard:'"$SHA"'

              # Navigate to the production compose project directory
              cd ~/devops-platform/prod

              # Inject runtime configuration
              export IMAGE_TAG=\"$SHA\"
              export REGISTRY_URL='${{ secrets.REGISTRY_URL }}'
              export DOMAIN='${{ secrets.DOMAIN }}'
              export DASHBOARD_AUTH='${{ secrets.DASHBOARD_AUTH }}'

              # Bring up the production stack
              # --pull never: image was already pulled above — do not re-pull
              # --remove-orphans: clean up services removed from compose file
              docker compose up -d --pull never --remove-orphans
            "

      - name: Remove SSH key from runner
        if: always()
        run: rm -f /tmp/deploy_key

  # ---------------------------------------------------------------------------
  # SMOKE TEST PROD — Health-check against the production subdomain
  # Validates that the newly deployed production containers are responding.
  # Retries for up to 90 seconds to allow for rolling restarts.
  # ---------------------------------------------------------------------------
  smoke-test-prod:
    name: Smoke Test (Production)
    runs-on: ubuntu-latest
    needs: deploy-prod

    steps:
      - name: Wait for production service to become healthy
        # Poll the health endpoint with a 90-second timeout.
        # Production gets a slightly longer window than dev/QA to account for
        # any warm-up time under live traffic.
        run: |
          echo "Checking https://${{ secrets.DOMAIN }}/health ..."
          for i in $(seq 1 18); do
            STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
                       --max-time 10 \
                       "https://${{ secrets.DOMAIN }}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Production health check passed (HTTP $STATUS) on attempt $i"
              exit 0
            fi
            echo "Attempt $i: got HTTP $STATUS — retrying in 5s..."
            sleep 5
          done
          echo "SMOKE TEST FAILED: ${{ secrets.DOMAIN }}/health did not return 200 within 90s"
          exit 1

      - name: Verify dashboard subdomain is reachable
        # Additional check on the dashboard subdomain served via Traefik
        run: |
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
                     --max-time 10 \
                     "https://dashboard.${{ secrets.DOMAIN }}/" || true)
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ]; then
            # 401 is acceptable — it means the dashboard is up but requires auth
            echo "Dashboard subdomain reachable (HTTP $STATUS)"
          else
            echo "SMOKE TEST FAILED: dashboard.${{ secrets.DOMAIN }} returned HTTP $STATUS"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # TEARDOWN QA — Shut down the QA slot after successful prod deployment
  # The QA environment is ephemeral — it is created per deploy-qa and torn
  # down here once production is confirmed healthy.
  # This step runs only after smoke-test-prod passes.
  # ---------------------------------------------------------------------------
  teardown-qa:
    name: Teardown QA Slot
    runs-on: ubuntu-latest
    needs: smoke-test-prod

    steps:
      - name: Write SSH deploy key
        run: |
          install -m 600 /dev/null /tmp/deploy_key
          echo "${{ secrets.VPS_SSH_KEY }}" > /tmp/deploy_key

      - name: Tear down QA slot via SSH
        # Stops and removes all QA containers, networks, and anonymous volumes.
        # Named volumes (if any) are preserved — only anonymous volumes are removed.
        run: |
          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "
              set -euo pipefail

              cd ~/devops-platform/qa

              # Bring down the QA stack — remove containers, networks, and orphans
              docker compose down --remove-orphans

              echo 'QA slot torn down successfully'
            "

      - name: Remove SSH key from runner
        if: always()
        run: rm -f /tmp/deploy_key

      - name: Deployment summary
        run: |
          echo "=============================================="
          echo "Production deployment complete."
          echo "Commit SHA : ${{ gitea.event.workflow_run.head_sha }}"
          echo "Image      : ${{ secrets.REGISTRY_URL }}/dashboard:${{ gitea.event.workflow_run.head_sha }}"
          echo "Live URL   : https://${{ secrets.DOMAIN }}"
          echo "QA slot    : torn down"
          echo "=============================================="
