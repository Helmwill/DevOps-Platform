# =============================================================================
# DEPLOY DEV — Build once, push to registry, deploy to dev slot
# Trigger: push to the `develop` branch
#
# Jobs:
#   build            — Docker build tagged with commit SHA, push to Gitea registry
#   deploy-dev       — SSH to VPS, pull image, docker compose up -d in dev slot
#   smoke-test-dev   — HTTP health-check against the dev subdomain
#
# The image tag = gitea.sha (full commit SHA) for complete traceability.
# This is the ONLY place the image is built; QA and prod promote this digest.
# =============================================================================

name: Deploy Dev

on:
  push:
    branches:
      - develop

# Only one deploy-dev run at a time — cancel older runs if a new push arrives
concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # BUILD — Docker build and push to Gitea container registry
  # Tags image with the full commit SHA for full traceability.
  # The image digest produced here is the single artefact promoted to QA/prod.
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      # Export the full image reference (registry/image:sha) for downstream jobs
      image_ref: ${{ steps.set-image-ref.outputs.image_ref }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log in to Gitea container registry
        # Use docker login against the project-configured Gitea registry.
        # Credentials are stored exclusively in Gitea Actions secrets.
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | \
            docker login "${{ secrets.REGISTRY_URL }}" \
              --username "${{ secrets.REGISTRY_USER }}" \
              --password-stdin

      - name: Build Docker image
        # Tag with full commit SHA so every image is uniquely traceable to its commit.
        # The image name follows the convention: registry/project/dashboard:<sha>
        run: |
          docker build \
            --tag "${{ secrets.REGISTRY_URL }}/dashboard:${{ gitea.sha }}" \
            --label "gitea.sha=${{ gitea.sha }}" \
            --label "gitea.ref=${{ gitea.ref }}" \
            .

      - name: Push Docker image to registry
        run: |
          docker push "${{ secrets.REGISTRY_URL }}/dashboard:${{ gitea.sha }}"

      - name: Set image reference output
        id: set-image-ref
        run: |
          echo "image_ref=${{ secrets.REGISTRY_URL }}/dashboard:${{ gitea.sha }}" \
            >> "$GITEA_OUTPUT"

  # ---------------------------------------------------------------------------
  # DEPLOY DEV — Pull image to VPS dev slot and bring up the stack
  # Connects to the VPS over SSH using a deploy key stored in secrets.
  # The dev slot is isolated via Docker Compose project name / directory.
  # ---------------------------------------------------------------------------
  deploy-dev:
    name: Deploy to Dev Slot
    runs-on: ubuntu-latest
    needs: build
    environment: dev

    steps:
      - name: Write SSH deploy key
        # Write the private key to a temp file with strict permissions.
        # The key is never printed to logs.
        run: |
          install -m 600 /dev/null /tmp/deploy_key
          echo "${{ secrets.VPS_SSH_KEY }}" > /tmp/deploy_key

      - name: Deploy to VPS dev slot via SSH
        # Single SSH session:
        #   1. Log in to the Gitea registry on the VPS
        #   2. Pull the exact image digest built in the `build` job
        #   3. Export environment variables consumed by docker-compose.yml
        #   4. Bring the dev stack up (recreate changed containers only)
        run: |
          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "
              set -euo pipefail

              # Authenticate the VPS Docker daemon with the registry
              echo '${{ secrets.REGISTRY_PASSWORD }}' | \
                docker login '${{ secrets.REGISTRY_URL }}' \
                  --username '${{ secrets.REGISTRY_USER }}' \
                  --password-stdin

              # Pull the exact image produced by the build job
              docker pull '${{ needs.build.outputs.image_ref }}'

              # Navigate to the dev compose project directory
              cd ~/devops-platform/dev

              # Inject runtime configuration as environment variables
              export IMAGE_TAG='${{ gitea.sha }}'
              export REGISTRY_URL='${{ secrets.REGISTRY_URL }}'
              export DOMAIN='${{ secrets.DOMAIN }}'
              export DASHBOARD_AUTH='${{ secrets.DASHBOARD_AUTH }}'

              # Bring up the dev stack (non-destructive — only recreates changed services)
              docker compose up -d --pull never --remove-orphans
            "

      - name: Remove SSH key from runner
        if: always()
        run: rm -f /tmp/deploy_key

  # ---------------------------------------------------------------------------
  # SMOKE TEST DEV — HTTP health-check against the dev subdomain
  # Retries for up to 60 seconds to allow the container to become ready.
  # Fails the job if the endpoint never returns HTTP 200.
  # ---------------------------------------------------------------------------
  smoke-test-dev:
    name: Smoke Test (Dev)
    runs-on: ubuntu-latest
    needs: deploy-dev

    steps:
      - name: Wait for dev service to become healthy
        # Poll the health endpoint with a 60-second timeout.
        # curl --fail exits non-zero on HTTP 4xx/5xx, failing the job.
        run: |
          echo "Checking https://dev.${{ secrets.DOMAIN }}/health ..."
          for i in $(seq 1 12); do
            STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
                       --max-time 10 \
                       "https://dev.${{ secrets.DOMAIN }}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS) on attempt $i"
              exit 0
            fi
            echo "Attempt $i: got HTTP $STATUS — retrying in 5s..."
            sleep 5
          done
          echo "SMOKE TEST FAILED: dev.${{ secrets.DOMAIN }}/health did not return 200 within 60s"
          exit 1
