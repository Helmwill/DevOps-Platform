---
# Gitea stack — Git hosting + CI runner
# Depends on the Traefik stack being up and `traefik-public` network existing.

networks:
  traefik-public:
    external: true
  gitea-internal:
    driver: bridge
    internal: true   # DB traffic stays off the public network

volumes:
  gitea-data:
    driver: local
  gitea-db:
    driver: local

services:

  # -----------------------------------------------------------------------
  # PostgreSQL — Gitea database
  # -----------------------------------------------------------------------
  gitea-db:
    image: postgres:16-alpine
    container_name: gitea-db
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: ${GITEA_DB_NAME:-gitea}
      POSTGRES_USER: ${GITEA_DB_USER:-gitea}
      POSTGRES_PASSWORD: ${GITEA_DB_PASSWORD}   # Required — never inline
    volumes:
      - gitea-db:/var/lib/postgresql/data
    networks:
      - gitea-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GITEA_DB_USER:-gitea} -d ${GITEA_DB_NAME:-gitea}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------------
  # Gitea — self-hosted Git service
  # -----------------------------------------------------------------------
  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    restart: unless-stopped
    depends_on:
      gitea-db:
        condition: service_healthy
    environment:
      # App identity
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__DEFAULT__APP_NAME: ${GITEA_APP_NAME:-Gitea}

      # Database
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: gitea-db:5432
      GITEA__database__NAME: ${GITEA_DB_NAME:-gitea}
      GITEA__database__USER: ${GITEA_DB_USER:-gitea}
      GITEA__database__PASSWD: ${GITEA_DB_PASSWORD}

      # Server / URLs
      GITEA__server__DOMAIN: gitea.${DOMAIN}
      GITEA__server__ROOT_URL: https://gitea.${DOMAIN}/
      GITEA__server__SSH_DOMAIN: gitea.${DOMAIN}
      GITEA__server__SSH_PORT: "22"
      GITEA__server__HTTP_PORT: "3000"
      GITEA__server__DISABLE_SSH: "false"

      # Security
      GITEA__security__SECRET_KEY: ${GITEA_SECRET_KEY}
      GITEA__security__INTERNAL_TOKEN: ${GITEA_INTERNAL_TOKEN}

      # Mailer (optional — set to disable if not needed)
      GITEA__mailer__ENABLED: ${GITEA_MAILER_ENABLED:-false}

      # Actions (enable built-in CI)
      GITEA__actions__ENABLED: "true"
    volumes:
      - gitea-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - traefik-public
      - gitea-internal
    ports:
      # Expose SSH directly on the host for git+ssh access
      - "${GITEA_SSH_PORT:-2222}:22"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"

      # ---- HTTP router (redirects to HTTPS) ----
      - "traefik.http.routers.gitea-http.rule=Host(`gitea.${DOMAIN}`)"
      - "traefik.http.routers.gitea-http.entrypoints=web"
      - "traefik.http.routers.gitea-http.middlewares=redirect-to-https"

      # ---- HTTPS router ----
      - "traefik.http.routers.gitea.rule=Host(`gitea.${DOMAIN}`)"
      - "traefik.http.routers.gitea.entrypoints=websecure"
      - "traefik.http.routers.gitea.tls=true"
      - "traefik.http.routers.gitea.tls.certresolver=letsencrypt"
      - "traefik.http.services.gitea.loadbalancer.server.port=3000"

  # -----------------------------------------------------------------------
  # Gitea Actions Runner — self-hosted CI runner
  # -----------------------------------------------------------------------
  gitea-runner:
    image: gitea/act_runner:latest
    container_name: gitea-runner
    restart: unless-stopped
    depends_on:
      - gitea
    environment:
      # Registration token generated in Gitea admin UI:
      #   Gitea → Site Admin → Runners → Create new runner
      GITEA_INSTANCE_URL: https://gitea.${DOMAIN}/
      GITEA_RUNNER_REGISTRATION_TOKEN: ${GITEA_RUNNER_TOKEN}
      GITEA_RUNNER_NAME: ${GITEA_RUNNER_NAME:-vps-runner-01}
      GITEA_RUNNER_LABELS: ${GITEA_RUNNER_LABELS:-ubuntu-latest:docker://node:20-bullseye}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # Runner needs Docker to spawn job containers
      - gitea-data:/data                            # Shared cache/workspace with Gitea
    networks:
      - gitea-internal
      - traefik-public
