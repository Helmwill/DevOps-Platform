# =============================================================================
# PR GATE — Security & Quality Gauntlet (T1 + T2 + T3)
# Trigger: any pull_request event against any branch
#
# Gates (all required — failure blocks merge):
#   lint          — ESLint code style enforcement
#   unit-test     — Jest unit tests with >=80% coverage gate
#   sast          — Semgrep SAST (CRITICAL/HIGH = hard block)
#   iac-scan      — Trivy IaC scan on Compose + Dockerfiles (HIGH/CRIT = hard block)
# =============================================================================

name: PR Gate

on:
  pull_request:
    branches:
      - "**"

# Cancel in-flight runs for the same PR so old runs don't waste runner capacity
concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # LINT — ESLint
  # Catches code-style violations and basic logic errors before any tests run.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js 20 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        # --max-warnings 0 means any warning is treated as an error
        run: npx eslint . --ext .js,.jsx,.ts,.tsx --max-warnings 0

  # ---------------------------------------------------------------------------
  # UNIT TEST — Jest with coverage gate
  # T1: Unit tests must pass AND coverage must be >=80% on all metrics.
  # Hard block: job fails (non-zero exit) if coverage threshold is not met.
  # ---------------------------------------------------------------------------
  unit-test:
    name: Unit Tests (Jest ≥80% coverage)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js 20 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Jest with coverage
        # --coverage enforces the thresholds defined in jest.config
        # --ci disables interactive mode and treats snapshot mismatches as failures
        # Coverage thresholds (branches/functions/lines/statements >=80%) must be
        # set in jest.config.js/ts under coverageThreshold — Jest exits non-zero
        # if any threshold is breached, which fails this job.
        run: npx jest --ci --coverage --coverageReporters=text --coverageReporters=lcov

      - name: Upload coverage report
        # Preserve the coverage artefact for review in the PR
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # SAST — Semgrep (T2)
  # Runs Semgrep with the auto ruleset which covers OWASP Top 10, CWE, and
  # language-specific security rules for TypeScript/JavaScript/React.
  # --error flag makes Semgrep exit non-zero on any finding at CRITICAL or HIGH
  # severity, which fails this job (hard block).
  # ---------------------------------------------------------------------------
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    # Run SAST in the official Semgrep container to guarantee version consistency
    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Run Semgrep scan
        # --config=auto pulls the latest recommended ruleset from the Semgrep registry
        # --error exits non-zero on any finding, making CRITICAL/HIGH a hard block
        # --severity ERROR and WARNING map to CRITICAL/HIGH in the auto config;
        # --error alone is sufficient to block on any rule match
        run: |
          semgrep scan \
            --config=auto \
            --error \
            --json-output=semgrep-results.json \
            || (echo "SAST HARD BLOCK: Semgrep found CRITICAL/HIGH findings — see semgrep-results.json" && exit 1)

      - name: Upload Semgrep results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 14

  # ---------------------------------------------------------------------------
  # IAC SCAN — Trivy on Compose files + Dockerfiles (T3)
  # Scans all Infrastructure-as-Code files for misconfigurations.
  # HIGH and CRITICAL severity findings are a hard block (exit-code 1).
  # ---------------------------------------------------------------------------
  iac-scan:
    name: IaC Scan (Trivy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Trivy
        # Install the latest stable Trivy release from the official script
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Run Trivy IaC scan
        # `trivy config .` recursively scans all Compose files and Dockerfiles
        # --exit-code 1 causes Trivy to exit non-zero when findings meet the
        #   severity filter, which fails this job (hard block)
        # --severity HIGH,CRITICAL ensures only HIGH/CRIT trigger the hard block
        # --ignorefile .trivyignore allows project-approved accepted-risk entries
        run: |
          trivy config . \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --format table \
            --output trivy-iac-results.txt \
            || (echo "IAC HARD BLOCK: Trivy found HIGH/CRITICAL IaC misconfigurations — see trivy-iac-results.txt" && exit 1)

      - name: Upload Trivy IaC results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-iac-results
          path: trivy-iac-results.txt
          retention-days: 14
