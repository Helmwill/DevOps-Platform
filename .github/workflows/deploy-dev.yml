# =============================================================================
# DEPLOY DEV — Build both images, push to registry, deploy to dev slot
# Trigger: push to the `dev` branch
#
# Branch strategy:
#   dev   → triggers this pipeline (dev → QA → prod promotion chain)
#   main  → production branch; represents what is live in production.
#           PRs should target `dev`, not `main`.  `main` is updated via
#           a merge from `dev` after a successful production deployment.
#
# Jobs:
#   build            — Build dashboard-backend and dashboard-frontend images
#   deploy-dev       — SSH to VPS, pull both images, docker compose up -d
#   smoke-test-dev   — HTTP health-check against the dev subdomain
#
# Image tags = github.sha for complete traceability.
# These are the ONLY builds; QA and prod promote the same digests.
# =============================================================================

name: Deploy Dev

on:
  push:
    branches:
      - dev

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # BUILD — Build and push backend + frontend Docker images
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log in to container registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | \
            docker login "${{ secrets.REGISTRY_URL }}" \
              --username "${{ secrets.REGISTRY_USER }}" \
              --password-stdin

      - name: Build backend image
        run: |
          docker build \
            --file dashboard/backend/Dockerfile \
            --tag "${{ secrets.REGISTRY_URL }}/dashboard-backend:${{ github.sha }}" \
            --label "git.sha=${{ github.sha }}" \
            --label "git.ref=${{ github.ref }}" \
            dashboard/backend/

      - name: Build frontend image
        run: |
          docker build \
            --file dashboard/frontend/Dockerfile \
            --tag "${{ secrets.REGISTRY_URL }}/dashboard-frontend:${{ github.sha }}" \
            --label "git.sha=${{ github.sha }}" \
            --label "git.ref=${{ github.ref }}" \
            dashboard/frontend/

      - name: Push images to registry
        run: |
          docker push "${{ secrets.REGISTRY_URL }}/dashboard-backend:${{ github.sha }}"
          docker push "${{ secrets.REGISTRY_URL }}/dashboard-frontend:${{ github.sha }}"


  # ---------------------------------------------------------------------------
  # DEPLOY DEV — Pull both images to VPS dev slot and bring up the stack
  # ---------------------------------------------------------------------------
  deploy-dev:
    name: Deploy to Dev Slot
    runs-on: ubuntu-latest
    needs: build
    environment: dev

    steps:
      - name: Write SSH deploy key
        run: |
          install -m 600 /dev/null /tmp/deploy_key
          echo "${{ secrets.VPS_SSH_KEY }}" > /tmp/deploy_key

      - name: Deploy to VPS dev slot via SSH
        run: |
          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "
              set -euo pipefail

              echo '${{ secrets.REGISTRY_PASSWORD }}' | \
                docker login '${{ secrets.REGISTRY_URL }}' \
                  --username '${{ secrets.REGISTRY_USER }}' \
                  --password-stdin

              docker pull '${{ secrets.REGISTRY_URL }}/dashboard-backend:${{ github.sha }}'
              docker pull '${{ secrets.REGISTRY_URL }}/dashboard-frontend:${{ github.sha }}'

              git -C ~/DevOps-Platform fetch origin && git -C ~/DevOps-Platform checkout dev && git -C ~/DevOps-Platform pull

              cd ~/DevOps-Platform/dev

              export IMAGE_TAG='${{ github.sha }}'
              export REGISTRY_URL='${{ secrets.REGISTRY_URL }}'
              export DOMAIN='${{ secrets.DOMAIN }}'
              export DASHBOARD_AUTH='${{ secrets.DASHBOARD_AUTH }}'

              docker compose up -d --pull never --remove-orphans

              echo '=== Container status after deploy ==='
              docker compose ps
              echo '=== Backend logs (last 20 lines) ==='
              docker compose logs --tail=20 dashboard-backend-dev
            "

      - name: Remove SSH key from runner
        if: always()
        run: rm -f /tmp/deploy_key

  # ---------------------------------------------------------------------------
  # SMOKE TEST DEV
  # ---------------------------------------------------------------------------
  smoke-test-dev:
    name: Smoke Test (Dev)
    runs-on: ubuntu-latest
    needs: deploy-dev

    steps:
      - name: Wait for dev service to become healthy
        run: |
          echo "=== DNS check ==="
          nslookup "dev.${{ secrets.DOMAIN }}" || echo "WARNING: DNS lookup failed for dev.${{ secrets.DOMAIN }}"

          echo "=== TCP reachability on port 443 ==="
          nc -zv -w5 "dev.${{ secrets.DOMAIN }}" 443 2>&1 || echo "WARNING: port 443 not reachable"

          echo "=== Health check loop ==="
          echo "Waiting 20s for containers to pass healthchecks before polling..."
          sleep 20
          echo "Checking https://dev.${{ secrets.DOMAIN }}/health ..."
          for i in $(seq 1 12); do
            STATUS=$(curl --no-progress-meter \
                         --output /dev/null \
                         --write-out "%{http_code}" \
                         --max-time 10 \
                         --insecure \
                         "https://dev.${{ secrets.DOMAIN }}/health" 2>/tmp/curl_err || true)
            CURL_ERR=$(cat /tmp/curl_err 2>/dev/null || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS) on attempt $i"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — ${CURL_ERR:-no error detail}"
            sleep 5
          done
          echo "SMOKE TEST FAILED: dev.${{ secrets.DOMAIN }}/health did not return 200 within 60s"
          exit 1
