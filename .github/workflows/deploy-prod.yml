# =============================================================================
# DEPLOY PROD — Promote QA-verified image to production with manual gate
# Trigger: workflow_run — runs only after deploy-qa completes successfully
#
# Branch strategy:
#   main  → production branch; represents exactly what is live in production.
#           Do NOT open PRs directly to `main` — they will not trigger any
#           deployment pipeline.  All changes flow through `dev` first.
#   dev   → integration branch; the entry point for the deployment chain.
#           Merge PRs to `dev` to trigger: dev → QA → prod (this workflow).
#
# Jobs:
#   guard            — Abort if Deploy QA did not succeed
#   approval-gate    — Pauses for manual approval (GitHub environment protection)
#   deploy-prod      — SSH to VPS, pull same image to prod slot, docker compose up -d
#   smoke-test-prod  — Health-check against the production subdomain
#   teardown-qa      — Tear down the QA slot after successful prod deployment
#
# The image is NEVER rebuilt here.  The exact image digest that passed all
# QA gauntlet gates is identified by the commit SHA from the workflow_run
# event and pulled directly from the registry.
# =============================================================================

name: Deploy Prod

on:
  workflow_run:
    workflows:
      - "Deploy QA"
    types:
      - completed
    branches:
      - dev

# Serialise production deployments — never run two at once
concurrency:
  group: deploy-prod
  cancel-in-progress: false   # Never cancel an in-progress production deployment

jobs:

  # ---------------------------------------------------------------------------
  # GUARD — Abort if the QA pipeline did not succeed in full.
  # All gauntlet gates must have passed before prod is touched.
  # ---------------------------------------------------------------------------
  guard:
    name: Guard — Verify Deploy QA Succeeded
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Confirm upstream success
        run: echo "Deploy QA succeeded — proceeding to production approval gate"

  # ---------------------------------------------------------------------------
  # APPROVAL GATE — Manual approval required before production deployment
  # This job targets the `production` GitHub environment, which must be
  # configured with Helmwill as a required reviewer.
  #
  # No automation bypasses this gate.  A human must explicitly approve in the
  # GitHub Actions UI before deploy-prod is allowed to run.
  # ---------------------------------------------------------------------------
  approval-gate:
    name: Approval Gate (Helmwill)
    runs-on: ubuntu-latest
    needs: guard
    # The `production` environment in GitHub must have:
    #   - Required reviewers: Helmwill
    #   - Protection rule: prevent self-review
    # The job will remain in "waiting" state until approved or rejected.
    environment: production

    steps:
      - name: Record approval
        # This step only runs after Helmwill has approved the deployment
        # in the GitHub Actions environment protection UI.
        run: |
          echo "Production deployment approved."
          echo "Deploying commit SHA: ${{ github.event.workflow_run.head_sha }}"
          echo "Image: ${{ secrets.REGISTRY_URL }}/dashboard:${{ github.event.workflow_run.head_sha }}"

  # ---------------------------------------------------------------------------
  # DEPLOY PROD — Pull exact image digest to VPS production slot
  # Uses the same commit SHA that was verified through the entire QA pipeline.
  # The production docker-compose project is kept strictly separate from dev/QA.
  #
  # Also captures the PREVIOUS running image tag so rollback-prod can use it
  # if the smoke test fails after this deployment.
  # ---------------------------------------------------------------------------
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: approval-gate

    outputs:
      # Previous image tag captured before this deployment — used by rollback-prod
      prev_image_tag: ${{ steps.prev-tag.outputs.prev_image_tag }}

    steps:
      - name: Write SSH deploy key
        run: |
          install -m 600 /dev/null /tmp/deploy_key
          echo "${{ secrets.VPS_SSH_KEY }}" > /tmp/deploy_key

      - name: Capture previous image tag for rollback
        id: prev-tag
        # Inspect the currently running backend container to get its image tag.
        # Falls back to the current SHA (no-op rollback) if no container is running.
        run: |
          PREV=$(ssh -i /tmp/deploy_key \
                     -o StrictHostKeyChecking=no \
                     -o BatchMode=yes \
                     "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
                   "docker inspect dashboard-backend-prod \
                      --format '{{.Config.Image}}' 2>/dev/null \
                      | cut -d: -f2 || echo '${{ github.event.workflow_run.head_sha }}'")
          echo "prev_image_tag=${PREV}" >> "$GITHUB_OUTPUT"
          echo "Previous image tag: $PREV"

      - name: Deploy to VPS production slot via SSH
        # Pulls the EXACT same image digest that passed all QA gates.
        # No code changes, no rebuild — pure image promotion.
        run: |
          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "
              set -euo pipefail

              # Authenticate the VPS Docker daemon with the registry
              echo '${{ secrets.REGISTRY_PASSWORD }}' | \
                docker login '${{ secrets.REGISTRY_URL }}' \
                  --username '${{ secrets.REGISTRY_USER }}' \
                  --password-stdin

              # Pull the exact images that were verified in QA — no rebuild
              docker pull '${{ secrets.REGISTRY_URL }}/dashboard-backend:${{ github.event.workflow_run.head_sha }}'
              docker pull '${{ secrets.REGISTRY_URL }}/dashboard-frontend:${{ github.event.workflow_run.head_sha }}'

              # Ensure VPS has latest compose files from dev branch
              git -C ~/DevOps-Platform fetch origin && git -C ~/DevOps-Platform checkout -B dev origin/dev

              # Navigate to the production compose project directory
              cd ~/DevOps-Platform/prod

              # Inject runtime configuration
              export IMAGE_TAG='${{ github.event.workflow_run.head_sha }}'
              export REGISTRY_URL='${{ secrets.REGISTRY_URL }}'
              export DOMAIN='${{ secrets.DOMAIN }}'
              export DASHBOARD_AUTH='${{ secrets.DASHBOARD_AUTH }}'

              # Bring up the production stack
              # --pull never: image was already pulled above — do not re-pull
              # --remove-orphans: clean up services removed from compose file
              docker compose up -d --pull never --remove-orphans

              echo '=== Container status after deploy ==='
              docker compose ps
              echo '=== Backend logs (last 20 lines) ==='
              docker compose logs --tail=20 dashboard-backend-prod
            "

      - name: Remove SSH key from runner
        if: always()
        run: rm -f /tmp/deploy_key

  # ---------------------------------------------------------------------------
  # SMOKE TEST PROD — Full smoke test suite via scripts/smoke.sh
  # Validates that all key API endpoints are healthy after deployment.
  # Failure triggers automatic rollback via rollback-prod.
  # ---------------------------------------------------------------------------
  smoke-test-prod:
    name: Smoke Test (Production)
    runs-on: ubuntu-latest
    needs: deploy-prod

    steps:
      - name: Checkout source (for smoke.sh)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Wait for production service to come up
        run: |
          echo "=== DNS check ==="
          nslookup "dashboard.${{ secrets.DOMAIN }}" || echo "WARNING: DNS lookup failed"

          echo "=== TCP reachability on port 443 ==="
          nc -zv -w5 "dashboard.${{ secrets.DOMAIN }}" 443 2>&1 || echo "WARNING: port 443 not reachable"

          echo "=== Health check loop ==="
          echo "Waiting 20s for containers to pass healthchecks before polling..."
          sleep 20
          echo "Checking https://dashboard.${{ secrets.DOMAIN }}/health ..."
          for i in $(seq 1 18); do
            STATUS=$(curl --no-progress-meter \
                         --output /dev/null \
                         --write-out "%{http_code}" \
                         --max-time 10 \
                         --insecure \
                         "https://dashboard.${{ secrets.DOMAIN }}/health" 2>/tmp/curl_err || true)
            CURL_ERR=$(cat /tmp/curl_err 2>/dev/null || true)
            if [ "$STATUS" = "200" ]; then
              echo "Service is up (HTTP $STATUS) on attempt $i"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — ${CURL_ERR:-no error detail}"
            sleep 5
          done
          echo "SMOKE TEST FAILED: service did not become reachable within 90s"
          exit 1

      - name: Run full smoke test suite
        # DASHBOARD_CREDENTIALS secret must be set in the `production` environment
        # as plain-text user:password (separate from the htpasswd DASHBOARD_AUTH).
        # If absent, smoke.sh will attempt unauthenticated checks.
        run: |
          bash scripts/smoke.sh \
            "https://dashboard.${{ secrets.DOMAIN }}" \
            "${{ secrets.DASHBOARD_CREDENTIALS }}"

  # ---------------------------------------------------------------------------
  # ROLLBACK PROD — Automatically restore the previous image on smoke failure
  # Only runs if smoke-test-prod fails.  Uses the prev_image_tag captured
  # before the deployment so the exact previous state is restored.
  # ---------------------------------------------------------------------------
  rollback-prod:
    name: Rollback Production (auto)
    runs-on: ubuntu-latest
    needs: [deploy-prod, smoke-test-prod]
    if: needs.smoke-test-prod.result == 'failure'

    steps:
      - name: Write SSH deploy key
        run: |
          install -m 600 /dev/null /tmp/deploy_key
          echo "${{ secrets.VPS_SSH_KEY }}" > /tmp/deploy_key

      - name: Rollback to previous image
        run: |
          PREV_TAG="${{ needs.deploy-prod.outputs.prev_image_tag }}"
          echo "Rolling back to image tag: $PREV_TAG"

          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "
              set -euo pipefail

              cd ~/DevOps-Platform/prod

              export IMAGE_TAG='${{ needs.deploy-prod.outputs.prev_image_tag }}'
              export REGISTRY_URL='${{ secrets.REGISTRY_URL }}'
              export DOMAIN='${{ secrets.DOMAIN }}'
              export DASHBOARD_AUTH='${{ secrets.DASHBOARD_AUTH }}'

              # Re-deploy using the previous image — already present on the host
              docker compose up -d --pull never --remove-orphans

              echo 'Rollback complete — running image: ${{ needs.deploy-prod.outputs.prev_image_tag }}'
            "

      - name: Remove SSH key from runner
        if: always()
        run: rm -f /tmp/deploy_key

      - name: Annotate rollback in workflow summary
        run: |
          {
            echo "## :warning: Production Rollback Triggered"
            echo ""
            echo "Smoke tests failed after deploying \`${{ github.event.workflow_run.head_sha }}\`."
            echo "Rolled back to previous image tag: \`${{ needs.deploy-prod.outputs.prev_image_tag }}\`."
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # TEARDOWN QA — Shut down the QA slot after successful prod deployment
  # The QA environment is ephemeral — it is created per deploy-qa and torn
  # down here once production is confirmed healthy.
  # This step runs only after smoke-test-prod passes.
  # ---------------------------------------------------------------------------
  teardown-qa:
    name: Teardown QA Slot
    runs-on: ubuntu-latest
    needs: smoke-test-prod

    steps:
      - name: Write SSH deploy key
        run: |
          install -m 600 /dev/null /tmp/deploy_key
          echo "${{ secrets.VPS_SSH_KEY }}" > /tmp/deploy_key

      - name: Tear down QA slot via SSH
        # Stops and removes all QA containers, networks, and anonymous volumes.
        # Named volumes (if any) are preserved — only anonymous volumes are removed.
        run: |
          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "
              set -euo pipefail

              cd ~/DevOps-Platform/qa

              # Bring down the QA stack — remove containers, networks, and orphans
              docker compose down --remove-orphans

              echo 'QA slot torn down successfully'
            "

      - name: Remove SSH key from runner
        if: always()
        run: rm -f /tmp/deploy_key

      - name: Write deployment summary
        run: |
          DEPLOYED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SHA="${{ github.event.workflow_run.head_sha }}"

          # Print to log
          echo "=============================================="
          echo "Production deployment complete."
          echo "Deployed at: $DEPLOYED_AT"
          echo "Commit SHA : $SHA"
          echo "Backend    : ${{ secrets.REGISTRY_URL }}/dashboard-backend:$SHA"
          echo "Frontend   : ${{ secrets.REGISTRY_URL }}/dashboard-frontend:$SHA"
          echo "Live URL   : https://dashboard.${{ secrets.DOMAIN }}"
          echo "QA slot    : torn down"
          echo "Smoke tests: PASSED"
          echo "=============================================="

          # Write rich summary to GitHub Actions job summary panel
          {
            echo "## Production Deployment Complete"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Deployed at | \`$DEPLOYED_AT\` |"
            echo "| Commit SHA | \`$SHA\` |"
            echo "| Live URL | https://dashboard.${{ secrets.DOMAIN }} |"
            echo "| Smoke tests | PASSED |"
            echo "| QA slot | torn down |"
          } >> "$GITHUB_STEP_SUMMARY"
