---
# Production slot — frontend + backend services, persistent, requires manual approval gate
#
# Traefik routing:
#   https://dashboard.${DOMAIN}/           → dashboard-frontend-prod (nginx, port 8080)
#   https://dashboard.${DOMAIN}/api/*      → dashboard-backend-prod  (express, port 3000)
#   https://dashboard.${DOMAIN}/health     → dashboard-backend-prod  (express, port 3000)
#
# Lifecycle     : persistent — only updated after Helmwill approves in GitHub Actions
# Auth          : basic-auth via DASHBOARD_AUTH secret (htpasswd string)
#
# Environment variables injected by deploy-prod.yml workflow:
#   IMAGE_TAG       — full commit SHA promoted from QA (no rebuild)
#   REGISTRY_URL    — container registry hostname
#   DOMAIN          — base domain (e.g. example.com)
#   DASHBOARD_AUTH  — htpasswd string for basic-auth

networks:
  traefik-public:
    external: true

services:

  dashboard-backend-prod:
    image: ${REGISTRY_URL}/dashboard-backend:${IMAGE_TAG:-latest}
    container_name: dashboard-backend-prod
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # Harden container filesystem — read-only root FS, /tmp as tmpfs
    # See docs/adr/006-docker-socket-hardening.md for rationale
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      # Docker socket mounted read-only — backend only reads container state
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"

      # ---- Backend: /health (no auth — required for smoke test / uptime checks) ----
      - "traefik.http.routers.dashboard-prod-health.rule=Host(`dashboard.${DOMAIN}`) && Path(`/health`)"
      - "traefik.http.routers.dashboard-prod-health.entrypoints=websecure"
      - "traefik.http.routers.dashboard-prod-health.tls=true"
      - "traefik.http.routers.dashboard-prod-health.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard-prod-health.priority=20"
      - "traefik.http.routers.dashboard-prod-health.service=dashboard-backend-prod"

      # ---- Backend: /api/* (requires auth) ----
      - "traefik.http.routers.dashboard-prod-api.rule=Host(`dashboard.${DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.dashboard-prod-api.entrypoints=websecure"
      - "traefik.http.routers.dashboard-prod-api.tls=true"
      - "traefik.http.routers.dashboard-prod-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard-prod-api.middlewares=dashboard-prod-auth"
      - "traefik.http.routers.dashboard-prod-api.priority=10"
      - "traefik.http.routers.dashboard-prod-api.service=dashboard-backend-prod"
      - "traefik.http.services.dashboard-backend-prod.loadbalancer.server.port=3000"

  dashboard-frontend-prod:
    image: ${REGISTRY_URL}/dashboard-frontend:${IMAGE_TAG:-latest}
    container_name: dashboard-frontend-prod
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # nginx writes to cache, pid, and tmp at runtime — provide tmpfs for each
    # /var/cache/nginx needs mode 01777 so the non-root nginx user can create
    # temp subdirectories; the image chown is overwritten by the tmpfs mount.
    read_only: true
    tmpfs:
      - /var/run
      - /tmp
    volumes:
      - type: tmpfs
        target: /var/cache/nginx
        tmpfs:
          mode: 01777
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"

      # ---- HTTP → HTTPS redirect ----
      - "traefik.http.routers.dashboard-prod-http.rule=Host(`dashboard.${DOMAIN}`)"
      - "traefik.http.routers.dashboard-prod-http.entrypoints=web"
      - "traefik.http.routers.dashboard-prod-http.middlewares=redirect-to-https"

      # ---- HTTPS router → frontend (catch-all, lower priority) ----
      - "traefik.http.routers.dashboard-prod.rule=Host(`dashboard.${DOMAIN}`)"
      - "traefik.http.routers.dashboard-prod.entrypoints=websecure"
      - "traefik.http.routers.dashboard-prod.tls=true"
      - "traefik.http.routers.dashboard-prod.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard-prod.middlewares=dashboard-prod-auth"
      - "traefik.http.routers.dashboard-prod.priority=1"
      - "traefik.http.routers.dashboard-prod.service=dashboard-frontend-prod"
      - "traefik.http.services.dashboard-frontend-prod.loadbalancer.server.port=8080"

      # ---- Basic-auth middleware (shared by both routers) ----
      - "traefik.http.middlewares.dashboard-prod-auth.basicauth.users=${DASHBOARD_AUTH}"
